<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réservation Coworking & Machroub</title>
    <link rel="stylesheet" href="reservation.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Réservez votre espace</h1>
            <p>Travaillez confortablement avec votre Machroub préféré.</p>
        </header>

        <form id="reservation-form">
            <div class="form-group">
                <label for="name">Nom Complet</label>
                <input type="text" id="name" placeholder="Votre nom" required>
            </div>

            <div class="form-group">
                <label for="type">Type d'espace</label>
                <select id="type">
                    <option value="open">Open Space</option>
                    <option value="private">Bureau Privé</option>
                    <option value="meeting">Salle de Réunion</option>
                </select>
            </div>

            <div class="form-group">
                <label for="date">Date de réservation</label>
                <input type="date" id="date" required>
            </div>

            <div class="machroub-section">
                <h3>Choisissez votre Machroub ☕</h3>
                <div class="options">
                    <label class="option-card">
                        <input type="radio" name="drink" value="cafe" checked>
                        <span>Café Noir</span>
                    </label>
                    <label class="option-card">
                        <input type="radio" name="drink" value="the">
                        <span>Thé Menthe</span>
                    </label>
                    <label class="option-card">
                        <input type="radio" name="drink" value="jus">
                        <span>Jus Frais</span>
                    </label>
                </div>
            </div>

            <button type="submit" class="btn-submit">Confirmer la réservation</button>
        </form>
    </div>

</body>
</html>
