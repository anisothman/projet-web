<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Coworking Premium - Grand Espace</title>
    <link rel="stylesheet" href="place.css">
</head>
<body>

<div class="main-wrapper">
    <div class="glass-container">
        <header>
            <div class="badge">ESPACE VIP</div>
            <h1>Réservez votre poste de travail</h1>
            <p>Un environnement spacieux conçu pour votre productivité.</p>
        </header>

        <div class="booking-grid">
            <div class="form-side">
                <div class="input-group">
                    <label>Informations personnelles</label>
                    <input type="text" placeholder="Nom complet">
                    <input type="email" placeholder="Adresse Email">
                </div>
                
                <div class="input-group">
                    <label>Votre Machroub</label>
                    <div class="machroub-grid">
                        <label class="m-item"><input type="radio" name="m" checked><span>☕ Café</span></label>
                        <label class="m-item"><input type="radio" name="m"><span>🍵 Thé</span></label>
                        <label class="m-item"><input type="radio" name="m"><span>🥤 Jus</span></label>
                    </div>
                </div>
            </div>

            <div class="map-side">
                <label>Plan de salle interactif</label>
                <div class="floor-plan-large">
                    <div class="table-block">
                        <div class="table-surface">Zone Alpha</div>
                        <div class="seats-layout">
                            <div class="seat free" title="Place A1">A1</div>
                            <div class="seat free" title="Place A2">A2</div>
                            <div class="seat occupied">A3</div>
                            <div class="seat free">A4</div>
                            <div class="seat selected">A5</div>
                            <div class="seat free">A6</div>
                        </div>
                    </div>

                    <div class="table-block">
                        <div class="table-surface">Zone Beta</div>
                        <div class="seats-layout">
                            <div class="seat free">B1</div>
                            <div class="seat free">B2</div>
                            <div class="seat occupied">B3</div>
                            <div class="seat free">B4</div>
                            <div class="seat free">B5</div>
                            <div class="seat free">B6</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <button class="confirm-btn">Confirmer la réservation — 25 DT / Jour</button>
        </footer>
    </div>
</div>

</body>
</html>
