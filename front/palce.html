<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réservation de Poste - Espace VIP</title>
    <link rel="stylesheet" href="place.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .page-entiere {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
        }

        .boite-reservation {
            background-color: white;
            width: 90%;
            max-width: 900px;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: left;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 25px;
            overflow: hidden;
            border-radius: 50%;
            border: 3px solid #f4c430;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9f9f9;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<div class="page-entiere">
    <div class="boite-reservation">
        <header style="text-align: center; margin-bottom: 30px;">
            <div class="logo">
                <img src="logo.png" alt="Logo">
            </div>
            <div style="font-size: 18px; color: #f4c430; font-weight: 600; margin-bottom: 10px;">✨ ESPACE VIP</div>
            <h1 style="margin: 10px 0; color: #333; font-size: 24px; font-weight: 700;">Réservez votre poste de travail</h1>
            <p style="color: #777; margin-bottom: 0; font-size: 14px;">Un environnement spacieux conçu pour votre productivité.</p>
        </header>

        <form>
            <div class="form-container">
                <div class="section">
                    <div class="group">
                    <label >
                        <span class="sigle">👤</span>
                        Informations personnelles
                    </label>
                    <input 
                        type="text" 
                        id="fullName" 
                        name="fullName"
                        placeholder="Nom complet" 
                        required>
                    <input 
                        type="email" 
                        id="email" 
                        name="email"
                        placeholder="Adresse Email" 
                        required>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone"
                        placeholder="Téléphone " >
                </div>
                
                <div class="group">
                    <label>
                        <span class="sigle">🍹</span>
                        Votre Machroub préféré
                    </label>
                    <div class="drinks">
                        <label class="drink"><input type="radio" name="m" checked><span>☕ Café</span></label>
                        <label class="drink"><input type="radio" name="m"><span>🍵 Thé</span></label>
                        <label class="drink"><input type="radio" name="m"><span>🥤 Jus</span></label>
                    </div>
                </div>
            </div>

           
            <div class="map">
                <label>
                    <span class="sigle">🗺️</span>
                    Plan de salle interactif
                </label>
                
                <div class="legend">
                    <div class="legend-item">
                        <div class="box"></div>
                        <span>Disponible</span>
                    </div>
                    <div class="legend-item">
                        <div class="box selected"></div>
                        <span>Sélectionné</span>
                    </div>
                    <div class="legend-item">
                        <div class="box occupied"></div>
                        <span>Occupé</span>
                    </div>
                </div>

                <div class="plan">
                    <div class="zone">
                        <div class="surface">
                            <span class="sigle">🌟</span>
                            Zone Alpha
                        </div>
                        <div class="seats" data-zone="alpha">
                            <div class="seat free" data-seat="A1" title="Place A1 - Disponible">A1</div>
                            <div class="seat free" data-seat="A2" title="Place A2 - Disponible">A2</div>
                            <div class="seat occupied" data-seat="A3" title="Place A3 - Occupée">A3</div>
                            <div class="seat free" data-seat="A4" title="Place A4 - Disponible">A4</div>
                            <div class="seat free" data-seat="A5" title="Place A5 - Disponible">A5</div>
                            <div class="seat free" data-seat="A6" title="Place A6 - Disponible">A6</div>
                        </div>
                    </div>
                    <div class="zone">
                        <div class="surface">
                            <span class="sigle">💎</span>
                            Zone Beta
                        </div>
                        <div class="seats" data-zone="beta">
                            <div class="seat free" data-seat="B1" title="Place B1 - Disponible">B1</div>
                            <div class="seat free" data-seat="B2" title="Place B2 - Disponible">B2</div>
                            <div class="seat occupied" data-seat="B3" title="Place B3 - Occupée">B3</div>
                            <div class="seat free" data-seat="B4" title="Place B4 - Disponible">B4</div>
                            <div class="seat free" data-seat="B5" title="Place B5 - Disponible">B5</div>
                            <div class="seat free" data-seat="B6" title="Place B6 - Disponible">B6</div>
                        </div>
                    </div>

                
                    <div class="table">
                        <div class="surface">
                            <span class="sigle">🚀</span>
                            Zone Gamma
                        </div>
                        <div class="seats" data-zone="gamma">
                            <div class="seat free" data-seat="C1" title="Place C1 - Disponible">C1</div>
                            <div class="seat free" data-seat="C2" title="Place C2 - Disponible">C2</div>
                            <div class="seat free" data-seat="C3" title="Place C3 - Disponible">C3</div>
                            <div class="seat occupied" data-seat="C4" title="Place C4 - Occupée">C4</div>
                            <div class="seat free" data-seat="C5" title="Place C5 - Disponible">C5</div>
                            <div class="seat free" data-seat="C6" title="Place C6 - Disponible">C6</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

            <footer style="margin-top: 30px; text-align: center; border-top: 1px solid #f1f1f1; padding-top: 20px;">
                <button type="submit" class="btn" id="confirmBtn" style="width: 100%; padding: 12px; border: none; border-radius: 25px; background: #f4c430; font-weight: 600; cursor: pointer; font-size: 14px;">
                    <span class="sigle">🎯</span>
                    <span class="text">Confirmer la réservation</span>
                    <span class="price" style="display: block; font-size: 12px; color: #666; margin-top: 5px;">25 DT / Jour</span>
                </button>
            </footer>
        </form>

</body>
</html>
