<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body>

    <div class="page-entiere">
        <div class="boite-admin">


            <div class="logo">
                <img src="logo.png" alt="Logo">
            </div>

            <h1 class="titre">Dashboard Admin</h1>
            <p class="sous-titre">Gestion intelligente des réservations</p>


            <div class="stats">
                <div class="card">
                    <h3 id="totalReservations">0</h3>
                    <p>Réservations</p>
                </div>

                <div class="card">
                    <h3 id="todayReservations">0</h3>
                    <p>Aujourd’hui</p>
                </div>

                <div class="card">
                    <h3 id="uniqueClients">0</h3>
                    <p>Clients</p>
                </div>
            </div>


            <div class="filters">
                <input type="text" id="searchInput" placeholder="🔍 Rechercher par email...">
                <input type="date" id="dateFilter">
            </div>


            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Nom</th>
                            <th>Email</th>
                            <th>Place</th>
                            <th>Date</th>
                            <th>Heure</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="reservationsTable"></tbody>
                </table>
            </div>

        </div>
    </div>

</body>

</html>
