<!DOCTYPE html>

<head>
    <title>Page de Connexion</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="../back/app.js"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', Arial, sans-serif;
            background: #f5f5f5;
        }
        
        .page-entiere {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .boite-connexion {
            background: #fff;
            width: 350px;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            overflow: hidden;
            border-radius: 50%;
        }
        
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        
        .titre {
            margin-bottom: 5px;
        }
        
        .sous-titre {
            color: gray;
            margin-bottom: 30px;
        }
        
        .groupe-input {
            text-align: left;
            margin-bottom: 20px;
        }
        
        .groupe-input label {
            font-size: 13px;
            color: #777;
        }
        
        .groupe-input input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 25px;
            border: none;
            background: #f1f1f1;
        }
        
        .groupe-input input:focus {
            outline: 2px solid #f4c430;
        }
        
        .bouton-connexion {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: #f4c430;
            font-weight: 600;
            cursor: pointer;
        }
        
        .bouton-connexion:hover {
            background: #e0b020;
        }
        
        .lien-mot-de-passe,
        .zone-inscription a {
            color: #f4c430;
            text-decoration: none;
        }
        
        .lien-mot-de-passe {
            display: block;
            margin-top: 15px;
            font-size: 13px;
        }
        
        .zone-inscription {
            margin-top: 25px;
        }
    </style>
</head>

<body>

    <div class="page-entiere">
        <div class="boite-connexion">

            <div class="logo">
                <img src="logo.png" alt="Logo"> <!-- Ensure logo.png exists -->
            </div>

            <h1 class="titre">Bienvenue</h1>
            <p class="sous-titre">Travaillez mieux, mangez bien!</p>

            <form id="loginForm">

                <div class="groupe-input">
                    <label for="email">Email</label> <!-- Added for attribute -->
                    <input id="email" type="email" name="email" placeholder="votre.email@example.com" required>
                </div>

                <div class="groupe-input">
                    <label for="password">Mot de passe</label> <!-- Added for attribute -->
                    <input id="password" type="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="bouton-connexion">SE CONNECTER</button> <!-- Fixed closing tag -->

            </form>

            <div class="zone-inscription">
                Pas de compte ? <a href="signup.html">S'inscrire</a>
            </div>

        </div>
    </div>

</body>

</html>
