<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Page de Connexion</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="page-entiere">
        <div class="boite-connexion">

            <div class="logo">
                <img src="logo.png" alt="Logo">
            </div>

            <h1 class="titre">Bienvenue</h1>
            <p class="sous-titre">Travaillez mieux, mangez bien!</p>

            <form id="loginForm">

                <div class="groupe-input">
                    <label for="email">Email</label>
                    <input id="email" type="email" name="email" placeholder="votre.email@example.com" required>
                </div>

                <div class="groupe-input">
                    <label for="password">Mot de passe</label>
                    <input id="password" type="password" name="password" placeholder="••••••••" required>
                </div>

                <div>
                    <p id="error-message"></p>
                </div>

                <button type="button" id="login-button" class="bouton-connexion">SE CONNECTER</button>

            </form>

            <div class="zone-inscription">
                Pas de compte ? <a href="signup.html">S'inscrire</a>
            </div>

        </div>
    </div>

</body>
<script src="../back/login.js"></script>

</html>
