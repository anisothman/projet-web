<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Page de Connexion</title>


    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="page-entiere">
        <div class="boite-connexion">

            <div class="logo">
                <img src="logo.png" alt="Logo">
            </div>

            <h1 class="titre">Bienvenue</h1>
            <p class="sous-titre">Travaillez mieux, mangez bien!</p>

            <form id="loginForm">

                <div class="groupe-input">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="flenbenfoulen@gmail.com" required>
                </div>

                <div class="groupe-input">
                    <label>Mot de passe</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="bouton-connexion">
                    SE CONNECTER
                </button>

            </form>

            <div class="zone-inscription">
                Pas de compte ? <a href="signup.html">S'inscrire</a>
            </div>

        </div>
    </div>

<script src="index.js"></script>
</body>

</html>
