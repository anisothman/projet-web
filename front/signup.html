<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Page d'Inscription</title>

    <link rel="stylesheet" href="signup.css">
</head>

<body>

    <div class="page-entiere">

        <div class="boite-connexion">

            <div class="logo">
                <img src="logo.png" alt="Logo">
            </div>

            <h1 class="titre">Créer un compte</h1>
            <p class="sous-titre">Rejoignez-nous dès maintenant!</p>

            <form id="signupForm">

                <div class="groupe-input">
                    <label for="nom">Nom complet</label>
                    <input type="text" id="nom" name="nom" placeholder="Flen Ben Foulen" required>
                </div>

                <div class="groupe-input">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="flenbenfoulen@gmail.com" required>
                </div>

                <div class="groupe-input">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="groupe-input">
                    <label for="confirm-password">Confirmer le mot de passe</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="bouton-connexion">
                    S'INSCRIRE
                </button>

            </form>

            <div class="zone-inscription">
                Vous avez déjà un compte ? <a href="login.html">Se connecter</a>
            </div>

        </div>

    </div>

<script src="index.js"></script>
</body>

</html>
