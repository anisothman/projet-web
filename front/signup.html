<!DOCTYPE html>

<head>

    <title>Page d'Inscription</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="../back/app.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', Arial, sans-serif;
            background-color: #f5f5f5;
        }
        
        .page-entiere {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
        }
        
        .boite-connexion {
            background-color: white;
            width: 350px;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            overflow: hidden;
            border-radius: 50%;
        }
        
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        
        .sous-titre {
            font-size: 14px;
            color: gray;
            margin-bottom: 30px;
        }
        
        .groupe-input {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .groupe-input label {
            font-size: 13px;
            color: #777;
            display: block;
            margin-bottom: 5px;
        }
        
        .groupe-input input {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            background-color: #f1f1f1;
            font-size: 14px;
            box-sizing: border-box;
        }
        
        .groupe-input input:focus {
            outline: 2px solid #f4c430;
        }
        
        .bouton-connexion {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background-color: #f4c430;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .bouton-connexion:hover {
            background-color: #e0b020;
        }
        
        .zone-inscription {
            margin-top: 25px;
            font-size: 14px;
            color: #333;
        }
        
        .zone-inscription a {
            color: #f4c430;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="page-entiere">

        <div class="boite-connexion">

            <div class="logo">
                <img src="logo.png" alt="Logo">
            </div>

            <h1 class="titre">Créer un compte</h1>

            <p class="sous-titre">Rejoignez-nous dès maintenant!</p>

            <form id="signupForm">

                <div class="groupe-input">
                    <label for="nom">Nom complet</label>
                    <input type="text" id="nom" name="nom" placeholder="Flen Ben Foulen" required>
                </div>

                <div class="groupe-input">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="flenbenfoulen@gmail.com" required>
                </div>

                <div class="groupe-input">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="groupe-input">
                    <label for="confirm-password">Confirmer le mot de passe</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="bouton-connexion">S'INSCRIRE
                </button>

            </form>

            <div class="zone-inscription">
                Vous avez déjà un compte ? <a href="login.html">Se connecter</a>
            </div>

        </div>

    </div>

</body>

</html>
